<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="num1">
     <input type="number" id="num2">
     <select name="Operation" id="selects">
        <option value="">Select Operator</option>
        <option value="add" >Add</option>
        <option value="sub">Sub</option>
        <option value="mul" >Mul</option>
        <option value="div">Div</option>
     </select>
     <small id="error"></small>
     <small id="output"></small>
     <button id="sum">Output</button>

     <script>
        let num1 = document.getElementById("num1")
        let num2 = document.getElementById("num2")
        let sum = document.getElementById("sum")
        let output = document.getElementById("output")
        let Operation = document.getElementById("selects")
        let error = document.getElementById("error")


        sum.addEventListener("click" , function(){

            error.innerText = "";
        output.innerText = "";

            let num1Value = num1.value.trim();
             let num2Value = num2.value.trim();
             let OperationVlaue = Operation.value

             if(OperationVlaue === ""){
                error.innerText = "Please enmter a Number"
                return;
             }

            if(num1Value === "" || num2Value === ""){
                error.innerText = "Please Enter a Number"
                return;
            }

            if(OperationVlaue === "add")
            {
                let Total = Number(num1Value) + Number(num2Value);
            output.innerText=Total;
            }
            else if(OperationVlaue === "sub")
            {
                let Total = Number(num1Value) - Number(num2Value);
            output.innerText=Total;
            }
            else if(OperationVlaue === "mul")
            {
                let Total = Number(num1Value) * Number(num2Value);
            output.innerText=Total;
            }
            else if(OperationVlaue === "div")
            {
                if(Number(num2Value) === 0){
                    error.innerText = "can Not divide by 0"
                    return;
                }
                let Total = Number(num1Value) / Number(num2Value);
            output.innerText=Total;
            }

            


        })

     </script>
</body>
</html>
