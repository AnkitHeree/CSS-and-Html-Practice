<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
.container{
    width: 100%;
    height: 80vh;
    background-color: black;
    border: 1px solid white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
}
    .relativ{
        width: 100%;
        height: 100px;
        background-color: rgb(255, 0, 212);
        border: 1px solid black;
        position: relative;
        top :400px;
    }

    .absolute{
        width: 100%;
        height: 100px;
        background-color: rgb(48, 233, 11);
        border: 1px solid black;
        position: absolute;
        top: 10px;
    }

    .fixed{
        width: 100%;
        height: 100px;
        background-color: rgb(179, 148, 148);
        border: 300px solid black;
        top: 10px;
    }

    .default{
        width: 100%;
        height: 100px;
        background-color: red;
        border: 1px solid black;
        position:static;
    }
</style>

</head>
<body>
    

 <div class="container">
       <div class="relativ"></div>
    <div class="absolute"></div>
    <div class="sticky"></div>
    <div class="fixed"></div>
 </div>
</body>
</html>
