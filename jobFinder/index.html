<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- header -->

    <header class="navbar">

        <h1>Job Finder</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">Jobs</a>
            <a href="#">Login</a>
            <a href="#">Card</a>

        </nav>

    </header>

    <!-- hereoSection -->

    <section class="hero">

        <h2>Find Your Dream Job </h2>
        <p>Search Job for Top Companies</p>
        <input type="text" placeholder="Search Here">
        <button class="search">Search</button>

    </section>

    <!-- job Section -->

    <section class="jobs">

        <h2>Latest Job</h2>

        <div class="job-container">

            <div class="job-card">
                <h3>Frontend Devloper</h3>
                <p>Company : Google</p>
                <p>Location : Mumbai</p>
                <button>Apply</button>
            </div>

            <div class="job-card">
                <h3>Backend Devloper</h3>
                <p>Company : Google</p>
                <p>Location : Mumbai</p>
                <button>Apply</button>
            </div>

            <div class="job-card">
                <h3>Angular Devloper</h3>
                <p>Company : Google</p>
                <p>Location : Mumbai</p>
                <button>Apply</button>
            </div>

        </div>

    </section>


</body>

</html>
